name: 🐛 Bug report
description: Signaler un bug ou un comportement inattendu
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler ce bug. Plus tu donnes de détails, plus vite il sera résolu.

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Décris clairement ce qui ne fonctionne pas
      placeholder: Quand je clique sur X, l'app fait Y au lieu de Z...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Liste précise des étapes
      placeholder: |
        1. Aller sur la vue Cosmos
        2. Sélectionner une personne
        3. Cliquer sur "Lier"
        4. Voir l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      placeholder: Je m'attendais à ce que...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportement observé
      placeholder: À la place, l'app fait...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / vidéo
      description: Drag & drop ici si tu peux capturer le bug visuellement

  - type: dropdown
    id: view
    attributes:
      label: Vue concernée
      multiple: true
      options:
        - Cosmos
        - Sablier Flow
        - Timeline
        - Carte
        - Éventail
        - Landing / Auth
        - Recherche foncière (Cerfa)
        - Onboarding
        - Autre / pas spécifique à une vue

  - type: input
    id: browser
    attributes:
      label: Navigateur + OS
      placeholder: Chrome 130 / macOS 14
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Logs console (si erreur JS)
      description: Ouvre la console (F12) et colle les erreurs
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Vérifications préalables
      options:
        - label: J'ai cherché dans les issues existantes pour éviter les doublons
          required: true
        - label: Je peux reproduire le bug de façon constante
          required: false
